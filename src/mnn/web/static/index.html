<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minna no Nihongo — Vocabulary Browser</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <button id="menu-btn" aria-label="menu">☰</button>
  <h1>みんなの日本語 <span class="muted">Vocab</span></h1>
  <input id="search" type="search" placeholder="Search kanji / kana / meaning…" autocomplete="off">
  <button id="theme-btn" aria-label="theme">🌓</button>
</header>
<div id="layout">
  <nav id="sidebar">
    <div id="filters">
      <label><input type="checkbox" id="f-kanji"> has kanji</label>
      <label><input type="checkbox" id="f-sentence"> has sentence</label>
      <label><input type="checkbox" id="f-mnemonic"> has mnemonic</label>
      <label><input type="checkbox" id="f-learned"> hide learned</label>
    </div>
    <ul id="lessons"></ul>
  </nav>
  <main id="content">
    <div id="intro"></div>
    <div id="cards"></div>
    <div id="empty" hidden>No matches.</div>
  </main>
</div>
<footer>
  <span id="stats"></span>
  <span class="muted">·</span>
  <span>by <a href="https://iampavel.dev">Pavel</a></span>
</footer>
<script src="app.js" defer></script>
</body>
</html>
